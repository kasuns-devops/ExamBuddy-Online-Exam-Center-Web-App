openapi: 3.0.3
info:
  title: ExamBuddy Project Ingestion API
  version: 0.1.0
  description: Contracts for admin project PDF ingestion and student project-based session start.
servers:
  - url: https://api.exambuddy.example.com
    description: Example production endpoint
security:
  - bearerAuth: []
paths:
  /v1/admin/projects:
    post:
      summary: Create a project
      tags: [Admin Projects]
      operationId: createProject
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/admin/projects/{projectId}/documents:
    post:
      summary: Upload a project PDF for ingestion
      tags: [Admin Projects]
      operationId: uploadProjectDocument
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '202':
          description: Upload accepted and ingestion started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatusResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/admin/projects/{projectId}/ingestion:
    get:
      summary: Get ingestion status for a project
      tags: [Admin Projects]
      operationId: getIngestionStatus
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Ingestion status retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestionStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /v1/student/projects:
    get:
      summary: List student-selectable projects
      tags: [Student Projects]
      operationId: listStudentProjects
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Projects list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/StudentProject'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/student/sessions:
    post:
      summary: Start a student test or exam session for selected project
      tags: [Student Sessions]
      operationId: startStudentSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentSession'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Active session conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient role permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    CreateProjectRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 200
        description:
          type: string
          maxLength: 1000

    Project:
      type: object
      required: [project_id, name, status, created_at, updated_at, question_count]
      properties:
        project_id:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        admin_id:
          type: string
        archived:
          type: boolean
        status:
          type: string
          enum: [DRAFT, PROCESSING, PUBLISHED, FAILED, ARCHIVED]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        question_count:
          type: integer
          minimum: 0

    IngestionStatusResponse:
      type: object
      required: [project_id, status, question_count]
      properties:
        project_id:
          type: string
        status:
          type: string
          enum: [DRAFT, PROCESSING, PUBLISHED, FAILED, ARCHIVED]
        question_count:
          type: integer
          minimum: 0
        error:
          type: string
          nullable: true
        updated_at:
          type: string
          format: date-time

    StudentProject:
      type: object
      required: [project_id, name, question_count]
      properties:
        project_id:
          type: string
        title:
          type: string
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        question_count:
          type: integer
          minimum: 1

    StartSessionRequest:
      type: object
      required: [project_id, mode]
      properties:
        project_id:
          type: string
        mode:
          type: string
          enum: [TEST, EXAM]

    StudentSession:
      type: object
      required: [session_id, project_id, mode, status, question_ids, started_at]
      properties:
        session_id:
          type: string
        project_id:
          type: string
        mode:
          type: string
          enum: [TEST, EXAM]
        status:
          type: string
          enum: [STARTED, SUBMITTED, ABANDONED, EXPIRED]
        question_ids:
          type: array
          items:
            type: string
        started_at:
          type: string
          format: date-time

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        code:
          type: string
          nullable: true
        requestId:
          type: string
          nullable: true
