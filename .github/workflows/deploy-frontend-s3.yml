name: Deploy Frontend (S3 + CloudFront)

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend-s3.yml'
  workflow_dispatch:

env:
  AWS_REGION: eu-north-1
  S3_BUCKET: exambuddy-front

jobs:
  deploy-frontend:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create production env file
        working-directory: frontend
        run: |
          cat > .env.production.local << EOF
          VITE_API_URL=${{ secrets.VITE_API_URL }}
          VITE_COGNITO_USER_POOL_ID=${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_REGION=${{ secrets.VITE_COGNITO_REGION }}
          VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN }}
          VITE_COGNITO_REDIRECT_URI=${{ secrets.VITE_COGNITO_REDIRECT_URI }}
          VITE_COGNITO_LOGOUT_URI=${{ secrets.VITE_COGNITO_LOGOUT_URI }}
          VITE_ENABLE_ANALYTICS=false
          EOF

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build:prod

      - name: Upload static assets to S3 (long cache)
        run: |
          aws s3 sync frontend/dist s3://${{ env.S3_BUCKET }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"

      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp frontend/dist/index.html s3://${{ env.S3_BUCKET }}/index.html \
            --cache-control "no-cache,no-store,must-revalidate" \
            --content-type "text/html"

      - name: Invalidate CloudFront cache
        if: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID != '' }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "## Frontend Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- Bucket: ${{ env.S3_BUCKET }}" >> $GITHUB_STEP_SUMMARY
          echo "- Region: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "- CloudFront invalidation: submitted" >> $GITHUB_STEP_SUMMARY
          else
            echo "- CloudFront invalidation: skipped (no CLOUDFRONT_DISTRIBUTION_ID secret)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Required GitHub Secrets" >> $GITHUB_STEP_SUMMARY
          echo "- AWS_ACCESS_KEY_ID" >> $GITHUB_STEP_SUMMARY
          echo "- AWS_SECRET_ACCESS_KEY" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_API_URL" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_USER_POOL_ID" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_CLIENT_ID" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_REGION" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_DOMAIN" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_REDIRECT_URI" >> $GITHUB_STEP_SUMMARY
          echo "- VITE_COGNITO_LOGOUT_URI" >> $GITHUB_STEP_SUMMARY
          echo "- CLOUDFRONT_DISTRIBUTION_ID (optional)" >> $GITHUB_STEP_SUMMARY
